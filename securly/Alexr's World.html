<script>
    async function Alexr() {
  const res = await fetch(`https://cdn.jsdelivr.net/gh/dskjfoisjfsjio/alexrsworld@latest/singlefile.html?v=${Date.now()}`);
  const text = await res.text();
  
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, "text/html");
  const html = window.parent.document;
  
  html.documentElement.innerHTML = doc.documentElement.innerHTML;
    doc.querySelectorAll("script").forEach(s => {
    const ns = html.createElement("script");
    if (s.src) {
      ns.src = s.src;
    } else {
      ns.textContent = s.textContent;
    }
    html.body.appendChild(ns);
  });
}

Alexr();
</script>
