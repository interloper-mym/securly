<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>VirtualXP</title>
		<meta property="og:title" content="VirtualXP"/>
		<meta property="og:url" content="https://lrusso.github.io/VirtualXP/VirtualXP.htm"/>
		<meta property="og:description" content="info@lrusso.com"/>
		<meta property="og:image" content="https://lrusso.github.io/VirtualXP/VirtualXPShare.png"/>
		<meta property="og:type" content="website"/>
		<meta property="og:site_name" content="VirtualXP"/>
		<meta name="theme-color" content="#000000"/>
		<meta name="mobile-web-app-capable" content="yes"/>
		<meta name="apple-mobile-web-app-capable" content="yes"/>
		<link rel="manifest" href="https://cdn.jsdelivr.net/gh/lrusso/VirtualXP@main/VirtualXP.json"/>
		<link rel="icon" sizes="16x16" type="image/png" href="https://cdn.jsdelivr.net/gh/lrusso/VirtualXP@main/VirtualXPFavIcon_16x16.png"/>
		<link rel="icon" sizes="192x192" type="image/png" href="https://cdn.jsdelivr.net/gh/lrusso/VirtualXP@main/VirtualXPFavIcon_192x192.png"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, user-scalable=no"/>
		<style>
			html,body{background-color:black;margin:0;padding:0;-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;cursor:default}
			#canvas{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);image-rendering:pixelated;image-rendering:crisp-edges}
			.percentage{position:fixed;width:64px;height:64px;left:0;right:0;top:120px;bottom:0;margin:auto auto;border:0;font-family:Arial;font-weight:bold;font-size:20px;background-color:black;color:white;text-align:center}
			.pleasewait{position:fixed;width:64px;height:64px;left:0;right:0;top:-50px;bottom:0;margin:auto auto;border:0}
			.lds-spinner{color:white;display:inline-block;position:relative;width:64px;height:64px}
			.lds-spinner div{transform-origin:32px 32px;animation:lds-spinner 1.2s linear infinite}
			.lds-spinner div:after{content:" ";display:block;position:fixed;top:3px;left:29px;width:5px;height:14px;border-radius:20%;background:white}
			.lds-spinner div:nth-child(1){transform:rotate(0deg);animation-delay:-1.1s}
			.lds-spinner div:nth-child(2){transform:rotate(30deg);animation-delay:-1s}
			.lds-spinner div:nth-child(3){transform:rotate(60deg);animation-delay:-0.9s}
			.lds-spinner div:nth-child(4){transform:rotate(90deg);animation-delay:-0.8s}
			.lds-spinner div:nth-child(5){transform:rotate(120deg);animation-delay:-0.7s}
			.lds-spinner div:nth-child(6){transform:rotate(150deg);animation-delay:-0.6s}
			.lds-spinner div:nth-child(7){transform:rotate(180deg);animation-delay:-0.5s}
			.lds-spinner div:nth-child(8){transform:rotate(210deg);animation-delay:-0.4s}
			.lds-spinner div:nth-child(9){transform:rotate(240deg);animation-delay:-0.3s}
			.lds-spinner div:nth-child(10){transform:rotate(270deg);animation-delay:-0.2s}
			.lds-spinner div:nth-child(11){transform:rotate(300deg);animation-delay:-0.1s}
			.lds-spinner div:nth-child(12){transform:rotate(330deg);animation-delay:0s}
			@keyframes lds-spinner{0%{opacity:1}100%{opacity:0}}
		</style>
	</head>
	<body>
		<div class="pleasewait"><div class="lds-spinner"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div></div>
		<div class="percentage"></div>
		<canvas id="canvas" height="640" width="480"></canvas>

		<script>
			var finalResponse;
			var parts = [
				"https://cdn.jsdelivr.net/gh/UGBONTOP/ugs-crunch-files@main/windowsxp/VirtualXP.part1",
				"https://cdn.jsdelivr.net/gh/UGBONTOP/ugs-crunch-files@main/windowsxp/VirtualXP.part2",
				"https://cdn.jsdelivr.net/gh/UGBONTOP/ugs-crunch-files@main/windowsxp/VirtualXP.part3"
				];

			var loadedBytes = new Array(parts.length).fill(0);
			var totalBytes  = new Array(parts.length).fill(0);

			function updateProgress()
				{
				var tl = loadedBytes.reduce(function(a,b){return a+b;},0);
				var tt = totalBytes.reduce(function(a,b){return a+b;},0);
				if (tt > 0) document.getElementsByClassName("percentage")[0].innerHTML = Math.floor(tl*100/tt) + "%";
				}

			function getISOImage()
				{
				Promise.all(parts.map(function(url, i)
					{
					return new Promise(function(resolve, reject)
						{
						var xhr = new XMLHttpRequest();
						xhr.open("GET", url, true);
						xhr.responseType = "arraybuffer";
						xhr.onload = function(){ xhr.status===200 ? resolve(xhr.response) : reject(); };
						xhr.onprogress = function(e){ if(e.lengthComputable){ loadedBytes[i]=e.loaded; totalBytes[i]=e.total; updateProgress(); } };
						xhr.onerror = function(){ reject(); };
						xhr.send(null);
						});
					})).then(function(buffers)
					{
					var len = buffers.reduce(function(a,b){return a+b.byteLength;},0);
					var combined = new Uint8Array(len);
					var offset = 0;
					buffers.forEach(function(buf){ combined.set(new Uint8Array(buf), offset); offset += buf.byteLength; });

					finalResponse = new Blob([combined], {type:"application/octet-stream"});


					var opts = {
						reportSpeed: function(s){ document.title = "VirtualXP - " + s + " MIPS"; },
						mem: "192",
						vgamem: "16",
						fast: true,
						bios: "https://cdn.jsdelivr.net/gh/lrusso/VirtualXP@main/VirtualXPBIOS.bin",
						vgabios: "https://cdn.jsdelivr.net/gh/lrusso/VirtualXP@main/VirtualXPVGA.bin",
						apic: false,
						acpi: false,
						pci: false,
						pcivga: false,
						floppy: false,
						winnt_hack: true,
						canvas: document.getElementById("canvas"),
						emulator: "https://cdn.jsdelivr.net/gh/lrusso/VirtualXP@main/VirtualXP.js"
						};
					opts["cda"] = new File(["empty.txt"], "filename");

					var halfix = new Halfix(opts);
					halfix.init(function()
						{
						halfix.run();
						setInterval(function(){try{halfix.updateScreen();}catch(err){}}, 1000);
						setTimeout(function()
							{
							document.getElementsByClassName("pleasewait")[0].style.display = "none";
							document.getElementsByClassName("percentage")[0].style.display = "none";
							}, 5000);
						});
					}).catch(function(err)
					{
					console.error("Failed to load parts:", err);
					document.getElementsByClassName("percentage")[0].innerHTML = "ERR";
					});
				}

			function blockSpecialKeys(e)
				{
				try
					{
					e = e || window.event;
					if (e.altKey || e.ctrlKey || e.metaKey || e.keyCode == 27)
						{
						e.preventDefault();
						e.stopPropagation();
						e.stopImmediatePropagation();
						}
					}
				catch(err){}
				}

			window.oncontextmenu = function(){ return false; };

			function resizeCanvas()
				{
				var canvas = document.getElementById("canvas");
				var winW = window.innerWidth;
				var winH = window.innerHeight;
				var scale = Math.min(winW / 640, winH / 480);
				canvas.style.width  = Math.floor(640 * scale) + "px";
				canvas.style.height = Math.floor(480 * scale) + "px";
				}

			window.addEventListener("resize", resizeCanvas);

			window.addEventListener("load", function()
				{
				resizeCanvas();
				document.getElementById("canvas").addEventListener("click", function()
					{
					try{ document.getElementById("canvas").requestPointerLock(); }catch(err){}
					});
				document.addEventListener("keydown",  function(e){ blockSpecialKeys(e); });
				document.addEventListener("keypress", function(e){ blockSpecialKeys(e); });
				document.addEventListener("keyup",    function(e){ blockSpecialKeys(e); });

				if (window.top == window.self)
					{
					getISOImage();
					}
				});

			if ("serviceWorker" in navigator)
				{
				navigator.serviceWorker.register("https://cdn.jsdelivr.net/gh/lrusso/VirtualXP@main/worker.js")
					.then(function(){}).catch(function(){});
				}
		</script>

		<script src="https://cdn.jsdelivr.net/gh/lrusso/VirtualXP@main/VirtualXPLoader.js"></script>
	</body>
</html>
